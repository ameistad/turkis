traefik:
  email: "{{ .Traefik.Email }}"
  domain: "{{ .Traefik.Domain }}"
apps:
  - name: "example-app"
    domains:
      - domain: "domain.com"
        aliases:
          - "www.domain.com"
          - "m.domain.com"
      - "api.domain.com"
    dockerfile: "/path/to/your/Dockerfile"
    buildContext: "/path/to/your/app"
    env:
      NODE_ENV: "production"
    keepOldContainers: 2
